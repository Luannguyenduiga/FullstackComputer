    <div class="container">
        <div class="row">
            <div class="col-12">
                <div class="slider-container">
                    <div class="slider">
                        <div class="slide"><img src="./assets/images/banner/banner1.jpg" alt="Banner 1"></div>
                        <div class="slide"><img src="./assets/images/banner/banner2.jpg" alt="Banner 2"></div>

                    </div>

                    <button class="prev" onclick="moveSlide(-1)">&#10094;</button> <!-- Nút bấm slides-->
                    <button class="next" onclick="moveSlide(1)">&#10095;</button>

                    <div class="dots">
                        <span class="dot" onclick="currentSlide(0)"></span>
                        <span class="dot" onclick="currentSlide(1)"></span>
                        <span class="dot" onclick="currentSlide(2)"></span>
                        <span class="dot" onclick="currentSlide(3)"></span>
                        <span class="dot" onclick="currentSlide(4)"></span>
                        <span class="dot" onclick="currentSlide(5)"></span>
                    </div>
                </div>
            </div>
        </div>
