<!DOCTYPE html>
<html lang="vi">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>BT FORM</title>
    <link rel="stylesheet" href="./assets/css/grid.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/all.min.css">

</head>
<style>
    body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f0f2f5;
    margin: 0;
    padding: 0;
    background-image: url('https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=2070');
    background-size: cover;
    background-position: center;
    image-rendering: pixelated; /* Cho phép hình ảnh nền hiển thị rõ nét */
}

/* Hiệu ứng lớp phủ mờ cho hình nền */
body::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: -1;
}

.container-about {
    margin: 0 auto;
    width: 1320px;
}

.content {
    float: left;
    padding-top: 200px;
    padding-left: 20px;
    width: 650px;
    justify-content: center;
    align-items: center;
}

.content h1 {
    font-size: 40px;
    font-family: Roboto-Slap;
    font-weight: 700;
    margin-top: 16px;
    color: #f4f4f3;
}

.content p {
    font-family: 'Times New Roman', Times, serif, sans-serif;
    color: #fcfcfc;
    text-align: justify;
    line-height: 26px;
    font-size: 26px;
}

.FORM_DANGNHAP {
    width: 400px;
    margin: 100px auto;
    padding: 20px;
    border: 1px solid #ccc;
    border-radius: 10px;
    background-color: #fff;
    position: relative;
    float: left;
}

.login h2 {
    text-align: center;
    margin-bottom: 20px;
}

.login .register-text {
    text-align: center;
    margin-bottom: 20px;
    font-size: 16px;
}

.dangnhap {
    margin-bottom: 15px;
    text-align: left;
}

.inputBox {
    margin-bottom: 15px;
}

/* /*.inputBox i {
    display: block;
    margin-bottom: 5px;
    font-style: normal;
} */

.close-btn {
    position: absolute;
    top: 10px; right: 15px;
    border: none; background: none;
    font-size: 25px; color: #888; cursor: pointer;
}

.social-login {
    display: flex;
    justify-content: space-between;
    margin: 20px 0;
}

.social-btn {
    flex: 1;
    margin: 0 5px;
    height: 45px;
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
    transition: background 0.3s;
}

.social-btn:hover {
    background: #f8f8f8;
}

/* Đường kẻ ngang styles */
.divider {
    display: flex;
    align-items: center;
    margin: 20px 0;
    color: #ccc;
}

.divider::before,
.divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: #eee;
}

.divider span {
    padding: 0 10px;
    font-size: 20px;
}

.inputBox input {
    width: 100%;
    padding: 12px;
    border: 2px solid #ccc;
    border-radius: 5px;
    font-size: 16px;
    box-sizing: border-box; /* Đảm bảo padding không làm thay đổi kích thước tổng thể */
}

.remember-login {
    display: flex;
    align-items: center;
    justify-content: center; /* Bây giờ dòng này sẽ có tác dụng */
    margin-top: 10px;
    gap: 5px;
}

.Loginbtn button {
    width: 100%;
    padding: 16px;
    background: linear-gradient(to right, #107430, #07aa40);
    color: white;
    border: none;
    border-radius: 23px;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
}

.Loginbtn button:hover {
    background: #0ae6b3;
}


.FORM_DANGNHAP .forgot-password {
    text-decoration: none;
    text-align: center;
    display: block;
    margin-top: 10px;
}

.Loginbtn button a {
    color: white;
    text-decoration: none;
}
</style>

<body>
    <div class="container-about">
        <div class="content">
            <h1>Chào mừng bạn đến với FullStackComputer</h1>
            <p>Hãy đăng nhập để tiếp tục.</p>
        </div>

        <div class="FORM_DANGNHAP">
            <button class="close-btn">&times;</button>
            <form method="post" class="login">
                <h2 style="font-size: 30px;">Đăng nhập</h2>
                <p class="register-text">Bạn chưa có tài khoản? <a href="./register.html"> Register</a></p>

                <div class="social-login">
                    <button class="social-btn"><img
                            src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"
                            alt="Google" width="20"></button>
                    <button class="social-btn"><i class="fa-brands fa-facebook" style="color: #1877f2;"></i></button>
                    <button class="social-btn"><i class="fa-brands fa-apple" style="color: #050505;"></i></button>
                </div>

                <div class="divider">
                    <span>or</span>
                </div>

                <section class="dangnhap">
                    <div class="inputBox">
                        <i class='bx bx-user'> Username </i>
                        <input type="text" placeholder="Your Username" required id="username">
                    </div>
                    <div class="inputBox">
                        <i class='bx bx-lock'> Password </i>
                        <input type="password" placeholder="Your Password" required id="password">
                    </div>
                </section>

                <div class="Loginbtn">
                    <button>Đăng nhập</button>
                </div>

                <div class="remember-login">
                    <input type="checkbox" name="remember"> Ghi nhớ đăng nhập
                </div>
            </form>
            <a href="#" class="forgot-password">Quên mật khẩu?</a>

        </div>
    </div>
    <script src="../assets/js/controllers/userController.js"></script>
</body>

</html>
