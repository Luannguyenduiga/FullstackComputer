<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký thành viên - FullStackComputer</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        /* Sử dụng hình ảnh công nghệ làm nền */
        background-image: url('https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=2070');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        height: 100-vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    /* Hiệu ứng lớp phủ mờ cho hình nền */
    body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: -1;
    }

    .signup-container {
        width: 100%;
        max-width: 450px;
    }

    .signup-box {
        background: #ffffff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        text-align: center;
    }

    h2 {
        color: #333;
        letter-spacing: 1px;
        margin-bottom: 10px;
    }

    p {
        color: #666;
        font-size: 14px;
        margin-bottom: 30px;
    }

    .input-group {
        text-align: left;
        margin-bottom: 20px;
    }

    .input-group label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: #444;
        margin-bottom: 8px;
    }

    .input-group input {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #ddd;
        border-radius: 6px;
        outline: none;
        transition: 0.3s;
    }

    .input-group input:focus {
        border-color: #007bff;
        box-shadow: 0 0 5px rgba(0, 123, 255, 0.2);
    }

    .btn-signup {
        width: 100%;
        padding: 14px;
        background: linear-gradient(to right, #107430, #07aa40);
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
        margin-top: 10px;
    }

    .btn-signup a {
        color: white;
        text-decoration: none;
    }

    .btn-signup:hover {
        background: #00b894;
    }

    .footer-links {
        margin-top: 25px;
        font-size: 14px;
        color: #666;
    }

    .footer-links a {
        color: #007bff;
        text-decoration: none;
        font-weight: 600;
    }
</style>

<body>
    <div class="signup-container">
        <div class="signup-box">
            <h2>TẠO TÀI KHOẢN</h2>
            <p>Gia nhập cộng đồng công nghệ FullStackComputer ngay hôm nay!</p>

            <form action="#">
                <div class="input-group">
                    <label for="fullname">Họ và tên</label>
                    <input type="text" id="fullname" placeholder="Nhập họ tên của bạn" required>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="example@gmail.com" required>
                </div>

                <div class="input-group">
                    <label for="phone">Số điện thoại</label>
                    <input type="tel" id="phone" placeholder="Nhập số điện thoại" required>
                </div>

                <div class="input-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Tối thiểu 8 ký tự" required>
                </div>

                <button type="submit" class="btn-signup"> <a href="./login.html">ĐĂNG KÝ NGAY</a></button>
            </form>

            <div class="footer-links">
                <span>Đã có tài khoản? <a href="./login.html">Đăng nhập</a></span>
            </div>
        </div>
    </div>
</body>

</html>
